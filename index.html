<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 赛博卷轴</title>
    <style>
        /* --- 基础重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #2a1a14; /* 卷轴底色 */
            min-height: 100vh;
            overflow-x: auto; 
            cursor: crosshair;
            font-family: 'STKaiti', 'KaiTi', serif; /* 默认中文字体 */
        }

        /* --- 卷轴布局 --- */
        .scroll-container {
            display: flex;
            min-height: 100vh;
            padding: 0 20px;
            transition: all 0.5s ease;
        }

        /* --- 木轴样式 --- */
        .wood-rod {
            width: 30px;
            background: linear-gradient(90deg, #2a1610 0%, #5d3a28 30%, #8b5a3c 50%, #5d3a28 70%, #2a1610 100%);
            box-shadow: inset 0 0 10px #000;
            flex-shrink: 0;
        }

        /* --- 宣纸内容区 --- */
        .paper-content {
            flex: 1;
            background-color: #f4e4bc;
            background-image: radial-gradient(#e6d5aa 1px, transparent 1px);
            background-size: 20px 20px; /* 模拟纸张纹理 */
            padding: 40px;
            
            /* 竖排核心属性 */
            writing-mode: vertical-rl; 
            text-orientation: upright;
            
            display: flex;
            align-items: flex-start;
            gap: 40px;
            overflow-x: auto;
            white-space: nowrap; /* 防止文字换行破坏竖排 */
        }

        /* --- 文本列样式 --- */
        .text-column {
            height: 80vh;
            font-size: 24px;
            line-height: 1.8;
            color: #2c2c2c;
            letter-spacing: 4px;
            text-align: justify;
        }

        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: #1a1a1a;
            border-left: 2px solid rgba(0,0,0,0.1);
            padding-left: 20px;
        }

        /* --- 加入我们按钮 (印章风格) --- */
        .join-btn {
            border: 3px double #b22222;
            color: #b22222;
            padding: 20px 10px;
            font-weight: bold;
            font-size: 28px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        .join-btn:hover {
            background: #b22222;
            color: #f4e4bc;
        }

        /* --- 翻译切换按钮 (悬浮) --- */
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #b22222;
            color: #f4e4bc;
            border: 2px solid #f4e4bc;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s;
        }
        .lang-toggle:hover {
            transform: scale(1.1);
        }

        /* --- 星星特效容器 --- */
        .star {
            position: absolute;
            pointer-events: none;
            animation: star-fade 1s forwards;
        }
        @keyframes star-fade {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* ========================
           英文模式适配 (关键修改)
           ======================== */
        body.en-mode {
            font-family: 'Georgia', 'Times New Roman', serif; /* 切换为衬线体 */
        }
        
        body.en-mode .paper-content {
            writing-mode: horizontal-tb; /* 恢复横排 */
            flex-direction: column;     /* 改为从上到下排列 */
            align-items: center;
            overflow-y: auto;
            white-space: normal;
            gap: 20px;
        }

        body.en-mode .text-column {
            height: auto;
            width: 80%;
            max-width: 800px;
            text-align: left;
            line-height: 1.6;
            letter-spacing: normal;
            border-bottom: 1px dashed rgba(0,0,0,0.1);
            padding-bottom: 20px;
        }

        body.en-mode .main-title {
            font-size: 36px;
            border-left: none;
            border-bottom: 2px solid #1a1a1a;
            padding-left: 0;
            padding-bottom: 10px;
            text-align: center;
            width: 100%;
        }

        body.en-mode .join-btn {
            font-size: 20px;
            padding: 10px 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- 翻译切换按钮 -->
    <button class="lang-toggle" onclick="toggleLanguage()">文 / EN</button>

    <div class="scroll-container">
        <div class="wood-rod"></div>
        
        <div class="paper-content" id="contentArea">
            <!-- 标题 -->
            <div class="text-column main-title" data-zh="枫树纸飞机" data-en="Maple Paper Plane">
                枫树纸飞机
            </div>

            <!-- 副标题 -->
            <div class="text-column" data-zh="重塑折叠的艺术" data-en="Reshaping the Art of Folding">
                重塑折叠的艺术
            </div>

            <!-- 正文段落1 -->
            <div class="text-column" data-zh="我们将建立一个国内国外都能交流的平台，让每个玩家都能找到组织——我们的发展计划" data-en="We are building a global platform for enthusiasts worldwide to connect. Our goal is to ensure every player finds their community.">
                我们将建立一个国内国外都能交流的平台，让每个玩家都能找到组织——我们的发展计划
            </div>

            <!-- 正文段落2 -->
            <div class="text-column" data-zh="我们想打造一个属于纸飞机爱好者的专属社区——在这里，大家不仅能公平竞技，还能学..." data-en="We aim to create an exclusive community for paper plane lovers. Here, you can compete fairly and learn from each other...">
                我们想打造一个属于纸飞机爱好者的专属社区——在这里，大家不仅能公平竞技，还能学...
            </div>

            <!-- 加入我们按钮 -->
            <div class="text-column" style="border:none;">
                <div class="join-btn" data-zh="加入我们" data-en="Join Us" onclick="alert('请联系管理员获取入群方式！')">
                    加入我们
                </div>
            </div>
        </div>

        <div class="wood-rod"></div>
    </div>

    <script>
        // 1. 翻译功能逻辑
        let isEnglish = false;
        
        function toggleLanguage() {
            isEnglish = !isEnglish;
            const elements = document.querySelectorAll('[data-zh]');
            const body = document.body;

            if (isEnglish) {
                // 切换到英文
                body.classList.add('en-mode');
                elements.forEach(el => {
                    el.innerText = el.getAttribute('data-en');
                });
            } else {
                // 切换回中文
                body.classList.remove('en-mode');
                elements.forEach(el => {
                    el.innerText = el.getAttribute('data-zh');
                });
            }
        }

        // 2. 点击星星特效逻辑 (一大四小)
        document.addEventListener('click', function(e) {
            createStar(e.clientX, e.clientY, true); // 大星星
            
            // 随机生成4个小星星围绕
            for(let i=0; i<4; i++) {
                setTimeout(() => {
                    const offsetX = (Math.random() - 0.5) * 60;
                    const offsetY = (Math.random() - 0.5) * 60;
                    createStar(e.clientX + offsetX, e.clientY + offsetY, false);
                }, i * 50);
            }
        });

        function createStar(x, y, isBig) {
            const star = document.createElement('div');
            star.innerHTML = '★';
            star.className = 'star';
            
            // 设置大小和颜色
            const size = isBig ? '40px' : '20px';
            const color = '#FFD700'; // 金黄色
            
            star.style.left = x + 'px';
            star.style.top = y + 'px';
            star.style.fontSize = size;
            star.style.color = color;
            
            // 修正定位中心点
            star.style.transform = 'translate(-50%, -50%)';
            
            document.body.appendChild(star);
            
            // 动画结束后移除元素
            setTimeout(() => {
                star.remove();
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 社区平台</title>
    <style>
        :root {
            --primary-color: #e74c3c; /* 枫叶红 */
            --secondary-color: #2c3e50; /* 深蓝灰 */
            --bg-color: #f4f6f7;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* 头部导航 */
        header {
            background-color: var(--card-bg);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--secondary-color);
            margin-left: 20px;
            font-weight: 500;
        }

        .btn-join {
            background-color: var(--primary-color);
            color: white !important;
            padding: 8px 16px;
            border-radius: 20px;
            transition: background 0.3s;
        }

        .btn-join:hover {
            background-color: #c0392b;
        }

        /* Hero 区域 */
        .hero {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--secondary-color);
        }

        .hero p {
            font-size: 1.2rem;
            color: #666;
            max-width: 800px;
            margin: 0 auto 2rem;
        }

        /* 痛点与解决方案 */
        .section {
            padding: 3rem 1rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .卡片 {
            背景: var(--card-bg);
            padding: 2REM;
            边界半径: 12PX;
            箱形阴影: 0 4PX 6PX RGBA(0,0,0,0.05);
            过渡: 改变 0.3s;
            上边框: 4PX 固体 var(--原色);
        }

        .卡片:盘旋 {
            改变: translateY(-5PX);
        }

        .卡片 H3 {
            上边距: 0;
            颜色: var(--二次色);
        }

        /* 路线图 */
        .路线图-项目 {
            背景: var(--card-bg);
            底边距: 1.5REM;
            padding: 1.5REM;
            边界半径: 8PX;
            左边框: 5PX 固体 var(--二次色);
            位置: 相对的;
        }

        .相位标记 {
            背景: var(--二次色);
            颜色: 白色的;
            padding: 4PX 8PX;
            边界半径: 4PX;
            字体大小: 0.8REM;
            位置: 绝对的;
            顶端: -10PX;
            左: 10PX;
        }

        /* 底部 */
        页脚 {
            背景色: var(--二次色);
            颜色: 白色的;
            text-align: 中心;
            padding: 2REM;
            上边距: 3REM;
        }

        页脚 一个 {
            颜色：#ecf0f1；
            文字装饰: 下划线;
        }
        
        /* 移动端适配 */
        @介质 (最大宽度: 600PX) {
            .英雄 H1 { 字体大小: 1.8REM; }
            页眉 { padding: 1REM; }
            .导航链接 { 显示: 没有一个; } /* 简化版隐藏菜单 */
        }

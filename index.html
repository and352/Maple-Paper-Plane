<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>枫树纸飞机 - 赛博竹简</title>
    <style>
        :root { --bg:#1a120d; --bamboo:#d4b886; --bamboo-dark:#b89a6a; --txt:#2c1e12; --acc:#8b0000; }
        body.dark { --bg:#080503; --bamboo:#3a2e20; --bamboo-dark:#2a2015; --txt:#d4af37; --acc:#ff4500; }
        *{margin:0;padding:0;box-sizing:border-box;transition:all .5s;}
        
        /* 页面全屏锁定 */
        body{
            background:var(--bg);width:100vw;height:100vh;overflow:hidden;
            font-family:'KaiTi',serif;cursor:crosshair;
        }
        
        /* 星星特效容器 */
        .stars-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden;}
        .star{position:absolute;animation:fade 1s forwards;}
        @keyframes fade{0%{transform:scale(0) rotate(0deg);opacity:1;}100%{transform:scale(1.5) rotate(180deg);opacity:0;}}

        .scroll{display:flex;width:100%;height:100%;align-items:stretch;}
        .rod{width:30px;background:linear-gradient(90deg,#2a1610,#5d3a28,#8b5a3c,#5d3a28,#2a1610);box-shadow:inset 0 0 10px rgba(0,0,0,.8);flex-shrink:0;z-index:20;}
        
        /* 竹简容器 */
        .bamboo-scroll{
            flex:1;display:flex;gap:6px;padding:20px 40px;overflow-x:auto;overflow-y:hidden;align-items:stretch;
            background:rgba(0,0,0,0.3);border-top:10px solid #3a2010;border-bottom:10px solid #3a2010;
            position:relative;
        }
        
        /* 核心：右侧遮罩层 + 水墨渐隐边缘 */
        .bamboo-scroll::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: var(--mask-width, 100%);
            background: linear-gradient(to left, var(--bg) 85%, transparent 100%);
            transition: width 0.05s linear;
            pointer-events: none;
            z-index: 10;
        }
        
        /* 单根竹简 */
        .slip{
            background:linear-gradient(90deg,var(--bamboo-dark),var(--bamboo) 10%,var(--bamboo) 90%,var(--bamboo-dark));
            padding:20px 10px;border-radius:4px;box-shadow:inset 0 0 5px rgba(0,0,0,0.3),2px 0 5px rgba(0,0,0,0.5);
            writing-mode:vertical-rl;text-orientation:upright;
            letter-spacing:.3em;line-height:1.8;
            color:var(--txt);font-size:1.2rem;
            flex-shrink:0;width:45px;white-space:nowrap;overflow:hidden;
        }
        
        /* 英文模式 */
        body.en .bamboo-scroll{flex-direction:row;align-items:flex-start;}
        body.en .slip{writing-mode:horizontal-tb;text-orientation:mixed;width:auto;min-width:180px;max-width:220px;max-height:80vh;overflow-y:auto;letter-spacing:0;line-height:1.6;white-space:normal;}

        /* 工具栏 */
        .top{position:fixed;top:20px;left:20px;z-index:100;}
        .btn{background:rgba(0,0,0,.6);color:#fff;border:1px solid #d4af37;padding:8px 15px;border-radius:20px;cursor:pointer;font-size:14px;backdrop-filter:blur(5px);}
        .lang{position:fixed;top:20px;right:20px;z-index:100;width:40px;height:40px;border-radius:50%;background:var(--acc);color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:bold;font-size:12px;}
        .mil{position:fixed;bottom:20px;left:20px;z-index:100;background:rgba(0,0,0,.6);color:#d4af37;padding:8px 15px;border-radius:20px;border:1px solid #d4af37;font-weight:bold;font-size:14px;}

        /* 功能模块 */
        .module{
            display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
            padding:15px 10px;flex-shrink:0;width:80px;
            background:linear-gradient(90deg,var(--bamboo-dark),var(--bamboo) 10%,var(--bamboo) 90%,var(--bamboo-dark));
            border-radius:4px;box-shadow:inset 0 0 5px rgba(0,0,0,0.3),2px 0 5px rgba(0,0,0,0.5);
            position:relative;z-index:10;
        }
        .act{border:3px double var(--acc);color:var(--acc);padding:15px 10px;font-size:1.2rem;font-weight:bold;cursor:pointer;background:transparent;transition:.3s;white-space:nowrap;writing-mode:horizontal-tb;}
        .act:hover{background:var(--acc);color:#fff;}
        
        .timer-display{font-size:1.8rem;font-weight:bold;color:var(--acc);font-family:monospace;writing-mode:horizontal-tb;}
        .best-record{font-size:0.8rem;color:var(--txt);opacity:0.8;writing-mode:horizontal-tb;text-align:center;}
        .timer-btns{display:flex;gap:8px;writing-mode:horizontal-tb;}
        .t-btn{padding:6px 12px;border:2px solid var(--acc);color:var(--acc);background:transparent;cursor:pointer;font-weight:bold;font-size:0.9rem;transition:.3s;}
        .t-btn:hover{background:var(--acc);color:#fff;}

        .ms-display{font-size:1.6rem;font-weight:bold;color:var(--txt);font-family:monospace;writing-mode:horizontal-tb;}
        .ms-label{font-size:0.8rem;opacity:0.7;writing-mode:horizontal-tb;}

        .badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:radial-gradient(circle,#f4e4bc 30%,#d4af37 100%);padding:40px;border-radius:50%;color:#8b0000;text-align:center;box-shadow:0 0 60px rgba(212,175,55,.8);border:4px solid #8b0000;z-index:2000;transition:.6s cubic-bezier(.175,.885,.32,1.275);}
        .badge.show{transform:translate(-50%,-50%) scale(1);}
    </style>
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    <div class="top"><button class="btn" onclick="document.body.classList.toggle('dark')">🏮 挑灯/熄灯</button></div>
    <div class="mil">✈️ 飞行里程: <span id="mil">0</span> 里</div>
    <div class="lang" onclick="toggleLang()">文/EN</div>

    <div class="scroll">
        <div class="rod"></div>
        <div class="bamboo-scroll" id="bamboo">
            <div class="slip" id="t" style="font-size:2rem;font-weight:bold;color:var(--acc);width:60px;">枫树纸飞机</div>
            <div id="content-slips" style="display:contents;"></div>

            <div class="module">
                <div class="timer-display" id="timer">00:00:00</div>
                <div class="best-record" id="best">最高滞空: 00:00:00</div>
                <div class="timer-btns">
                    <button class="t-btn" id="startBtn" onclick="toggleTimer()">起</button>
                    <button class="t-btn" onclick="resetTimer()">重置</button>
                </div>
            </div>

            <div class="module">
                <div class="ms-label" id="msLabel">毫秒级计时</div>
                <div class="ms-display" id="msTimer">00.00</div>
                <div class="timer-btns">
                    <button class="t-btn" id="msStartBtn" onclick="toggleMsTimer()">起</button>
                    <button class="t-btn" onclick="resetMsTimer()">重置</button>
                </div>
            </div>

            <div class="module"><div class="act" onclick="drawFortune()" id="ft">求签</div></div>
        </div>
        <div class="rod"></div>
    </div>

    <div class="badge" id="badge"><div style="font-size:50px;filter:drop-shadow(0 0 5px gold);">✈️</div><div style="font-weight:bold;font-size:24px;margin-top:10px;">凌云之志</div><div style="font-size:14px;margin-top:5px;">飞行里程破百</div></div>

<script>
// 1. 双语数据
const D={
zh:{t:"枫树纸飞机",c:`【愿景】\n筑一方净土，聚四海同好。\n融公平竞技、系统教程与深度社交于一体，\n只为纸飞机爱好者，寻一处归心之所。\n\n【破局】\n叹当今短视频江湖，虽喧嚣繁华，却重浮华而轻沉淀。\n吾辈立志，破除三座大山：\n一曰不公：凡纸与特种纸混战，致使新锐难立；\n二曰孤岛：少战队归属，致使高手孤身奋战；\n三曰碎片：良法散落，缺系统实测之明鉴。\n\n【规划】\n建内外双通之台，令天下飞手皆有所归。\n初阶筑基：立用户图鉴，定分级赛制；\n次阶聚势：建战队勋章，成结构化百科；\n终阶出海：启多语切换，登全球排行榜。\n\n若同此念，诚邀入局，共襄盛举。`,ft:"求签",msLabel:"毫秒级计时"},
en:{t:"Maple Paper Plane",c:`[Our Goal]\nWe want to build a fun and fair community for paper plane fans.\nWe will offer fair games, step-by-step tutorials, and a great place to make friends.\n\n[The Problem]\nRight now, short-video apps are too noisy and lack real depth. We want to fix three things:\n1. Unfair Games: Regular paper and special paper shouldn't compete together.\n2. Playing Alone: Players need teams so they don't feel lonely.\n3. Messy Info: Good tips are scattered everywhere. We need a real guide.\n\n[Our Plan]\nWe are building a platform for all pilots:\nStep 1: User profiles and fair tournaments.\nStep 2: Team badges and a clear Wiki.\nStep 3: Multi-language support and global rankings.\n\nIf you like this idea, join us and let's build it together!`,ft:"Fortune",msLabel:"MS Timer"}
};
let lang='zh';

function renderBamboo(){
    const d=D[lang];
    document.getElementById('t').innerText=d.t;
    document.getElementById('ft').innerText=d.ft;
    document.getElementById('msLabel').innerText=d.msLabel;
    
    const container=document.getElementById('content-slips');
    container.innerHTML='';
    
    if(lang==='zh'){
        const lines = d.c.split('\n');
        lines.forEach(line => {
            if(line.trim() !== ''){
                const slip = document.createElement('div');
                slip.className = 'slip';
                slip.innerText = line;
                container.appendChild(slip);
            }
        });
    } else {
        const paragraphs = d.c.split('\n\n');
        paragraphs.forEach(p => {
            const slip = document.createElement('div');
            slip.className = 'slip';
            slip.innerText = p;
            container.appendChild(slip);
        });
    }
    
    // 重新渲染后，重置遮罩并绑定滚动事件
    initScrollMask();
}

// 2. 核心：双向卷轴遮罩逻辑
function initScrollMask(){
    const bamboo = document.getElementById('bamboo');
    bamboo.scrollLeft = 0; // 初始回到最左侧（完全收卷）
    
    // 绑定滚动事件
    bamboo.onscroll = () => {
        const maxScroll = bamboo.scrollWidth - bamboo.clientWidth;
        if(maxScroll <= 0) return;
        
        // 计算滚动比例 (0 到 1)
        const progress = bamboo.scrollLeft / maxScroll;
        // 遮罩宽度从 100% 递减到 0%
        const maskWidth = Math.max(0, (1 - progress) * 100);
        
        // 动态修改CSS变量
        document.documentElement.style.setProperty('--mask-width', `${maskWidth}%`);
    };
}

function toggleLang(){
    lang=lang=='zh'?'en':'zh';
    document.body.classList.toggle('en');
    renderBamboo();
}
renderBamboo();

// 3. 精准普通计时器
let mil=parseInt(localStorage.getItem('maple_mil'))||0;
let best=parseInt(localStorage.getItem('maple_best'))||0;
let timerInt=null, startTime=0, elapsed=0, running=false;
document.getElementById('mil').innerText=mil;
updateBestDisplay();

function updateDisplay(ms){
    const totalSec = Math.floor(ms / 1000);
    const h=String(Math.floor(totalSec/3600)).padStart(2,'0');
    const m=String(Math.floor((totalSec%3600)/60)).padStart(2,'0');
    const s=String(totalSec%60).padStart(2,'0');
    document.getElementById('timer').innerText=`${h}:${m}:${s}`;
}
function updateBestDisplay(){
    const h=String(Math.floor(best/3600)).padStart(2,'0');
    const m=String(Math.floor((best%3600)/60)).padStart(2,'0');
    const s=String(best%60).padStart(2,'0');
    document.getElementById('best').innerText=`最高滞空: ${h}:${m}:${s}`;
}
function toggleTimer(){
    if(running){
        clearInterval(timerInt);
        elapsed += Date.now() - startTime;
        document.getElementById('startBtn').innerText="起";
    } else {
        startTime = Date.now();
        timerInt=setInterval(()=>{
            const current = elapsed + (Date.now() - startTime);
            updateDisplay(current);
        }, 50);
        document.getElementById('startBtn').innerText="停";
    }
    running = !running; // 状态翻转
}
function resetTimer(){
    clearInterval(timerInt);running=false;
    const finalSec = Math.floor(elapsed / 1000);
    if(finalSec > best){
        best = finalSec;
        localStorage.setItem('maple_best', best);
        updateBestDisplay();
    }
    elapsed = 0;
    updateDisplay(0);
    document.getElementById('startBtn').innerText="起";
}
function addMileage(n){
    mil+=n;
    document.getElementById('mil').innerText=mil;
    localStorage.setItem('maple_mil',mil);
    if(mil === 100){
        document.getElementById('badge').classList.add('show');
        setTimeout(()=>document.getElementById('badge').classList.remove('show'),3000);
    }
}
setInterval(()=>{ if(running) addMileage(1); }, 1000);

// 4. 精准毫秒计时器
let msInt=null, msStartTime=0, msElapsed=0, msRunning=false;
function updateMsDisplay(ms){
    const s=String(Math.floor(ms/1000)).padStart(2,'0');
    const cs=String(Math.floor((ms%1000)/10)).padStart(2,'0');
    document.getElementById('msTimer').innerText=`${s}.${cs}`;
}
function toggleMsTimer(){
    if(msRunning){
        clearInterval(msInt);
        msElapsed += Date.now() - msStartTime;
        document.getElementById('msStartBtn').innerText="起";
    } else {
        msStartTime = Date.now();
        msInt=setInterval(()=>{
            const current = msElapsed + (Date.now() - msStartTime);
            updateMsDisplay(current);
        }, 10);
        document.getElementById('msStartBtn').innerText="停";
    }
    msRunning = !msRunning; // 状态翻转
}
function resetMsTimer(){
    clearInterval(msInt);msRunning=false;
    msElapsed = 0;
    updateMsDisplay(0);
    document.getElementById('msStartBtn').innerText="起";
}

// 5. 抽签功能
const poems=["素纸轻折寄长风，枫林深处觅归鸿。","指尖翻飞化神翼，不负韶华不负空。","莫道凡纸无傲骨，借得长风上九霄。","千回百转匠心在，一掷凌云万里遥。","聚散随缘皆过客，唯留纸翼记平生。"];
function drawFortune(){
    let msg;
    if(Math.random()<=0.2){
        const p=poems[Math.floor(Math.random()*poems.length)];
        msg=lang=='zh'?`【上上签】\n${p}\n\n此乃吉兆，愿君乘风破浪！`:`[Great Blessing]\n${p}\n\nAn auspicious sign! Ride the wind!`;
    }else{msg=lang=='zh'?"【平签】\n风平浪静，宜静候佳音。":"[Ordinary Sign]\nCalm winds. Wait for good news.";}
    
    const ftBtn = document.getElementById('ft');
    ftBtn.innerText = msg;
    ftBtn.style.borderColor = 'var(--txt)';
    ftBtn.style.color = 'var(--txt)';
    ftBtn.onclick = null;
    setTimeout(()=>{
        ftBtn.innerText = D[lang].ft;
        ftBtn.style.borderColor = '';
        ftBtn.style.color = '';
        ftBtn.onclick = drawFortune;
    }, 3000);
}

// 6. 星星特效

    if(e.target.closest('.act')||e.target.closest('.t-btn')||e.target.closest('.btn')||e.target.closest('.lang'))return;

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 赛博卷轴</title>
    <style>
        :root { --bg:#2a1a14; --paper:#f4e4bc; --txt:#3d2b1f; --acc:#8b0000; }
        body.dark { --bg:#0f0805; --paper:#2c241b; --txt:#d4af37; --acc:#ff4500; }
        *{margin:0;padding:0;box-sizing:border-box;transition:all .5s;}
        body{background:var(--bg);min-height:100vh;overflow-x:auto;font-family:'KaiTi',serif;cursor:crosshair;}
        
        /* 卷轴主体 */
        .scroll{display:flex;min-height:100vh;padding:60px 20px 40px;}
        .rod{width:30px;background:linear-gradient(90deg,#2a1610,#5d3a28,#8b5a3c,#5d3a28,#2a1610);box-shadow:inset 0 0 10px rgba(0,0,0,.8);flex-shrink:0;}
        .paper{flex:1;background:var(--paper);padding:40px;box-shadow:0 0 30px rgba(0,0,0,.3);writing-mode:vertical-rl;text-orientation:mixed;position:relative;overflow:hidden;}
        
        /* 竖排文字排版 */
        h1{font-size:2.5rem;color:var(--acc);margin-bottom:2rem;letter-spacing:0.5rem;}
        p{line-height:2;margin-bottom:1.5rem;font-size:1.1rem;}
        
        /* 功能区域布局 */
        .dashboard{display:flex;gap:2rem;margin-top:2rem;border-right:2px solid var(--acc);padding-right:2rem;height:60vh;}
        .panel{border:2px solid var(--acc);padding:1rem;display:flex;flex-direction:column;align-items:center;justify-content:space-between;}
        
        /* 按钮与交互 */
        button{background:transparent;border:2px solid var(--acc);color:var(--acc);padding:0.5rem 1rem;font-family:inherit;font-size:1.2rem;cursor:pointer;transition:0.3s;}
        button:hover{background:var(--acc);color:var(--paper);}
        .switch{margin-top:1rem;cursor:pointer;}
        
        /* 点击特效 */
        .sparkle{position:absolute;width:10px;height:10px;background:gold;border-radius:50%;pointer-events:none;animation:fly 1s forwards;}
        @keyframes fly{to{transform:translate(var(--tx),var(--ty));opacity:0;}}
        
        /* 成就弹窗 */
        .modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--paper);border:4px double var(--acc);padding:2rem;z-index:100;transition:0.5s;text-align:center;}
        .modal.show{transform:translate(-50%,-50%) scale(1);}
        
        /* 底部信息栏 (包含落款) */
        .footer-info {
            position: absolute;
            bottom: 20px;
            left: 20px; /* 放在左下角/左侧 */
            display: flex;
            gap: 20px;
            align-items: center;
            font-size: 0.9rem;
            color: var(--acc);
            opacity: 0.8;
        }
        
        /* 落款样式 */
        .signature {
            border: 1px solid var(--acc);
            padding: 5px 10px;
            background: rgba(139, 0, 0, 0.05);
            writing-mode: vertical-rl;
            height: 120px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="scroll">
    <div class="rod"></div>
    <div class="paper" id="paper">
        <!-- 标题 -->
        <h1>枫树纸飞机 · 赛博卷轴</h1>
        
        <!-- 介绍文案 -->
        <p>筑一方净土，聚四海同好。于此方寸之间，以代码为墨，以情怀为纸，重现纸飞机之灵动。</p>
        <p>Build a pure land, gather friends from all over the world.</p>
        
        <!-- 仪表盘区域 -->
        <div class="dashboard">
            <div class="panel">
                <div>计时器 (秒)</div>
                <div id="timer">00:00</div>
                <button onclick="toggleTimer()">启停</button>
                <div style="font-size:0.8rem">里程: <span id="mileage">0</span>里</div>
            </div>
            <div class="panel">
                <div>毫秒级测试</div>
                <div id="ms-timer">0.000</div>
                <button onclick="toggleMsTimer()">记录滞空</button>
            </div>
        </div>

        <!-- 求签区域 -->
        <div style="margin-top:2rem; text-align:center;">
            <button onclick="drawLottery()" style="font-size:1.5rem; padding:1rem 2rem; border-width:4px;">🎋 求签 🎋</button>
            <div id="lottery-result" style="margin-top:1rem; font-weight:bold; min-height:2rem;"></div>
        </div>

        <!-- 底部信息区 (包含落款) -->
        <div class="footer-info">
            <div>共襄盛举</div>
            
            <!-- 这里是你要的落款，已经修复了代码残留问题 -->
            <div class="signature">
                江湖刀剑：炬<br>
                江湖侠客：<time_location>滞吧fffff</time_location>
            </div>
        </div>

        <!-- 挑灯/熄灯开关 -->
        <div class="switch" onclick="document.body.classList.toggle('dark')">
            🏮 挑灯 / 熄灯
        </div>
    </div>
    <div class="rod"></div>
</div>

<!-- 成就弹窗 -->
<div class="modal" id="achievement-modal">
    <h2>🏆 凌云之志</h2>
    <p>飞行里程突破 100 里！</p>
    <button onclick="closeModal()">收下</button>
</div>

<script>
    // --- 逻辑脚本 ---
    let seconds = 0;
    let timerInterval;
    let isRunning = false;
    let mileage = 0;
    
    // 计时器逻辑
    function toggleTimer() {
        if(isRunning) {
            clearInterval(timerInterval);
            isRunning = false;
        } else {
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = new Date(seconds * 1000).toISOString().substr(14, 5);
                
                // 里程计算：每10秒增加1里
                if(seconds % 10 === 0) {
                    mileage++;
                    document.getElementById('mileage').innerText = mileage;
                    if(mileage === 100) showAchievement();
                }
            }, 1000);
            isRunning = true;
        }
    }

    // 毫秒计时器
    let msStart;
    let msInterval;
    function toggleMsTimer() {
        if(msInterval) {
            clearInterval(msInterval);
            msInterval = null;
        } else {
            msStart = Date.now();
            msInterval = setInterval(() => {
                document.getElementById('ms-timer').innerText = ((Date.now() - msStart)/1000).toFixed(3);
            }, 10);
        }
    }

    // 求签逻辑
    const lots = ["上上签：长风破浪会有时", "中吉签：直挂云帆济沧海", "下下签：今日宜静不宜动", "上吉签：一举成名天下知"];
    function drawLottery() {
        const resultDiv = document.getElementById('lottery-result');
        resultDiv.innerText = "正在请示天机...";
        setTimeout(() => {
            resultDiv.innerText = lots[Math.floor(Math.random() * lots.length)];
        }, 1000);
    }

    // 成就弹窗
    function showAchievement() {
        document.getElementById('achievement-modal').classList.add('show');
    }
    function closeModal() {
        document.getElementById('achievement-modal').classList.remove('show');
    }

    // 点击特效 (一大星四小心)
    document.addEventListener('click', (e) => {
        createSparkle(e.clientX, e.clientY, true); // 大星
        for(let i=0; i<4; i++) {
            setTimeout(() => {
                createSparkle(e.clientX + (Math.random()-0.5)*50, e.clientY + (Math.random()-0.5)*50, false);
            }, i*50);
        }
    });

    function createSparkle(x, y, isBig) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.width = isBig ? '20px' : '8px';
        el.style.height = isBig ? '20px' : '8px';
        el.style.setProperty('--tx', (Math.random()-0.5)*100 + 'px');
        el.style.setProperty('--ty', (Math.random()-0.5)*100 + 'px');
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }
</script>

</body>
</html>

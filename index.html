<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 赛博朋克社区</title>
    <style>
        /* 1. 全局设置 */
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            line-height: 1.6;
            cursor: crosshair;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* 赛博朋克动态外边框 */
            border: 4px solid transparent;
            box-sizing: border-box;
            animation: cyber-border 3s linear infinite;
        }

        @keyframes cyber-border {
            0% { border-color: #ff0055; box-shadow: 0 0 10px #ff0055; }
            33% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            66% { border-color: #ffe600; box-shadow: 0 0 10px #ffe600; }
            100% { border-color: #ff0055; box-shadow: 0 0 10px #ff0055; }
        }

        /* 2. 内容容器 */
        .container {
            max-width: 800px;
            width: 90%;
            padding: 40px 20px;
            z-index: 10;
            position: relative;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff0055, #ffe600, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #00ffff;
            border-left: 4px solid #00ffff;
            padding-left: 10px;
            margin-top: 30px;
            font-size: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #cccccc;
        }

        strong {
            color: #fff;
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }

        li::before {
            content: ">>";
            color: #ff0055;
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        /* 3. 画布层 (用于绘制枫叶) */
        #canvas-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto; /* 允许点击 */
            z-index: 5;
        }
    </style>
</head>
<body>

    <!-- 背景特效层 -->
    <canvas id="canvas-layer"></canvas>

    <!-- 内容区域 -->
    <div class="container">
        <h1>枫树纸飞机</h1>
        <p style="text-align: center; color: #ffe600; font-weight: bold;">
            致力于构建一个集公平竞技、系统教程与深度社交于一体的纸飞机爱好者社区平台。
        </p>
        
        <p>当前短视频平台上的纸飞机圈子虽流量巨大，但普遍存在重娱乐轻沉淀的问题。为此，本平台旨在解决三大痛点：</p>

        <h2>| 核心痛点</h2>
        <ul>
            <li><strong>缺乏公平性：</strong>普通纸与特种纸同台竞技，新手难以立足。</li>
            <li><strong>社交孤岛：</strong>玩家缺乏战队体系与归属感，多为单打独斗。</li>
            <li><strong>知识碎片化：</strong>优质教程散落各处，缺乏系统的实测验证机制。</li>
        </ul>

        <h2>| 我们的愿景</h2>
        <p>我们要打造的不仅仅是一个论坛，而是一个<strong>数字化纸飞机生态实验室</strong>。</p>
        <p>在这里，每一次折叠都有数据支撑，每一次投掷都有公平见证。</p>
    </div>

    <!-- 核心脚本：枫叶生成与交互 -->
    <script>
        const canvas = document.getElementById('canvas-layer');
        const ctx = canvas.getContext('2d');
        let width, height;
        let leaves = [];
        let particles = []; // 爆炸粒子

        // 调整画布大小
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 枫叶类
        class Leaf {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 15 + 10; // 枫叶大小
                this.speedY = Math.random() * 1 + 0.5;
                this.speedX = Math.random() * 1 - 0.5;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
                this.color = `rgba(255, ${Math.floor(Math.random() * 100 + 100)}, 0, 0.8)`; // 橙红色系
                this.isDead = false;
                
                // 赛博朋克描边状态
                this.isHovered = false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                
                // 如果被激活（鼠标悬停或点击前摇），添加发光描边
                if (this.isHovered) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                } else {
                    ctx.shadowBlur = 0;
                }

                // 绘制枫叶路径 (简化版五角枫叶)
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size * 0.2, -this.size * 0.2);
                ctx.lineTo(this.size, -this.size * 0.3);
                ctx.lineTo(this.size * 0.4, this.size * 0.2);
                ctx.lineTo(this.size * 0.6, this.size);
                ctx.lineTo(0, this.size * 0.5);
                ctx.lineTo(-this.size * 0.6, this.size);
                ctx.lineTo(-this.size * 0.4, this.size * 0.2);
                ctx.lineTo(-this.size, -this.size * 0.3);
                ctx.lineTo(-this.size * 0.2, -this.size * 0.2);
                ctx.closePath();

                ctx.fillStyle = this.color;
                ctx.fill();
                
                if (this.isHovered) {
                    ctx.stroke(); // 绘制发光边框
                }

                ctx.restore();
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX + Math.sin(this.y * 0.01) * 0.5; // 飘落摆动
                this.rotation += this.rotationSpeed;

                // 边界检查
                if (this.y > height + 50) {
                    this.y = -50;
                    this.x = Math.random() * width;
                    this.isDead = false;
                }
            }
        }

        // 爆炸粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 6 - 3;
                this.speedY = Math.random() * 6 - 3;
                this.color = color;
                this.life = 1; // 生命值 1.0 -> 0
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.02; // 慢慢消失
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // 初始化枫叶
        for (let i = 0; i < 20; i++) {
            leaves.push(new Leaf());
        }

        // 动画循环
        function animate() {
            ctx.clearRect(0, 0, width, height);

            // 更新和绘制枫叶
            leaves.forEach(leaf => {
                leaf.update();
                leaf.draw();
            });

            // 更新和绘制爆炸粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }
        animate();

        // 交互逻辑：点击检测
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            // 倒序遍历，优先点击最上层的叶子
            for (let i = leaves.length - 1; i >= 0; i--) {
                const leaf = leaves[i];
                // 简单的距离检测 (判定半径为 size * 1.5)
                const dist = Math.hypot(clickX - leaf.x, clickY - leaf.y);
                
                if (dist < leaf.size * 1.5) {
                    // 触发爆炸！
                    createExplosion(leaf.x, leaf.y, leaf.color);
                    
                    // 移除这片叶子，并在顶部生成新的
                    leaves.splice(i, 1);
                    setTimeout(() => {
                        leaves.push(new Leaf());
                    }, 1000); // 1秒后重生
                    
                    break; // 一次只点一片
                }
            }
        });

        // 创建爆炸效果
        function createExplosion(x, y, color) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, color));
                // 增加一些白色的火花
                if (i % 3 === 0) {
                    particles.push(new Particle(x, y, '#ffffff')); 
                }
            }
        }
        
        // 鼠标移动时的悬停高亮效果
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            leaves.forEach(leaf => {
                const dist = Math.hypot(mouseX - leaf.x, mouseY - leaf.y);
                if (dist < leaf.size * 1.5) {
                    leaf.isHovered = true;
                    document.body.style.cursor = 'pointer';
                } else {
                    leaf.isHovered = false;
                }
            });
        });
    </script>
</body>
</html>

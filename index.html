<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 重塑折叠的艺术</title>
    <style>
        /* --- 基础重置与全局样式 --- */
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background-color: #050505; /* 纯黑底，绝对清晰 */
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            cursor: crosshair; /* 十字准星光标 */
        }

        /* --- 容器与排版 --- */
        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
            color: #ff4d4d;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #00ff00;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.5rem;
            text-align: center;
            color: #00ff00;
            margin-bottom: 40px;
            font-weight: normal;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-align: justify;
        }

        strong {
            color: #fff;
            font-weight: bold;
        }

        /* --- 核心板块样式 --- */
        .section-title {
            font-size: 1.8rem;
            color: #ff9966;
            margin-top: 50px;
            margin-bottom: 20px;
            border-left: 5px solid #00ff00;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 4px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateX(5px);
            border-color: #ff9966;
        }

        .card-title {
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 爆炸特效 CSS --- */
        .explosion-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            animation: explode-fade 0.8s ease-out forwards;
        }

        @keyframes explode-fade {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { opacity: 1; }
            100% { transform: scale(1.5) rotate(180deg); opacity: 0; }
        }

        /* 大星星样式 */
        .star-big {
            width: 40px;
            height: 40px;
            background-color: #FFD700; /* 金黄色 */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 10px #FFD700);
        }

        /* 小星星样式 - 已改为黄色 */
        .star-small {
            width: 15px;
            height: 15px;
            background-color: #FFFF00; /* 亮黄色 */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 5px #FFFF00);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>枫树纸飞机</h1>
    <h2>【重塑折叠的艺术】</h2>

    <p>我们不只是社区，更是纸飞机爱好者的<b>数字基地</b>。<br>
    在这里，我们将<b>硬核竞技</b>、<b>系统化知识图谱</b>与<b>深度社交网络</b>完美融合，让每一次投掷都拥有回响。</p>

    <div class="section-title">⚡ 击碎行业壁垒</div>
    <p>告别短视频时代的浮躁与碎片化，我们直面三大核心痛点，重建秩序：</p>

    <div class="card">
        <div class="card-title">⚖️ 竞技失衡：拒绝“特种纸”碾压“普通纸”。</div>
        <p>我们要建立分级赛事体系，让技术回归本质，新手亦有出头之日。</p>
    </div>

    <div class="card">
        <div class="card-title">📉 传承断层：拒绝“野路子”失传。</div>
        <p>建立数字化折纸图谱，将老法师的经验转化为可检索的代码。</p>
    </div>

    <div class="card">
        <div class="card-title">🤝 社交孤岛：拒绝“单机游戏”。</div>
        <p>连接全球飞友，从线上约战到线下集会，让热爱不再孤单。</p>
    </div>
</div>

<script>
    // --- 点击爆炸特效逻辑 (一大四小) ---
    document.addEventListener('click', function(e) {
        createExplosion(e.clientX, e.clientY);
    });

    function createExplosion(x, y) {
        // 1. 创建中心大星星
        const bigStar = document.createElement('div');
        bigStar.className = 'explosion-particle star-big';
        bigStar.style.left = (x - 20) + 'px'; // 居中定位
        bigStar.style.top = (y - 20) + 'px';
        document.body.appendChild(bigStar);

        // 动画结束后移除元素
        setTimeout(() => bigStar.remove(), 800);

        // 2. 创建四个小星星 (上下左右散开)
        const offsets = [
            { dx: -40, dy: -40 }, // 左上
            { dx: 40, dy: -40 },  // 右上
            { dx: -40, dy: 40 },  // 左下
            { dx: 40, dy: 40 }    // 右下
        ];

        offsets.forEach(offset => {
            const smallStar = document.createElement('div');
            smallStar.className = 'explosion-particle star-small';
            // 计算位置并减去自身半径以居中
            smallStar.style.left = (x + offset.dx - 7.5) + 'px'; 
            smallStar.style.top = (y + offset.dy - 7.5) + 'px';
            
            // 给小星星加一点随机旋转，看起来更自然
            const randomRotate = Math.random() * 360;
            smallStar.style.transform = `rotate(${randomRotate}deg)`;
            
            document.body.appendChild(smallStar);
            setTimeout(() => smallStar.remove(), 800);
        });
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>枫树纸飞机 - 赛博卷轴</title>
    <style>
        :root { --bg:#2a1a14; --paper:#f4e4bc; --txt:#3d2b1f; --acc:#8b0000; }
        body.dark { --bg:#0f0805; --paper:#2c241b; --txt:#d4af37; --acc:#ff4500; }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);min-height:100vh;overflow-x:auto;font-family:'KaiTi',serif;cursor:crosshair;}
        
        /* --- 核心修改1：真正的 SVG 历史纹路 --- */
        #history-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none;
            background-size: 160px 160px; transition: background-image 2s ease-in-out;
        }

        .scroll{display:flex;min-height:100vh;padding:60px 20px 40px;}
        .rod{width:30px;background:linear-gradient(90deg,#2a1610,#5d3a28,#8b5a3c,#5d3a28,#2a1610);box-shadow:inset 0 0 10px rgba(0,0,0,.8);flex-shrink:0;}
        .paper{flex:1;background:var(--paper);padding:40px;box-shadow:0 0 30px rgba(0,0,0,.3);writing-mode:vertical-rl;text-orientation:mixed;display:flex;flex-direction:column;align-items:center;position:relative;}
        
        h1{font-size:2.5em;margin-bottom:20px;color:var(--acc);letter-spacing:5px;}
        .controls{writing-mode:horizontal-tb;margin-top:30px;display:flex;gap:15px;flex-wrap:wrap;justify-content:center;}
        button{padding:10px 20px;background:var(--acc);color:#fff;border:none;cursor:pointer;font-family:inherit;font-size:1.1em;box-shadow:0 4px 0 #5a0000;transform:translateY(0);transition:all .1s;}
        button:active{transform:translateY(4px);box-shadow:none;}
        
        .stats{margin:20px 0;font-size:1.2em;line-height:2;}
        .highlight{color:var(--acc);font-weight:bold;}
        
        /* 成就弹窗 */
        #achievement-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--paper); border: 4px solid var(--acc); padding: 30px; z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.8); text-align: center; writing-mode: horizontal-tb;
        }
        #achievement-modal h2 { color: var(--acc); margin-bottom: 10px; }
        
        /* 抽签按钮样式 */
        #lottery-btn { background: #d4af37; color: #2a1a14; box-shadow: 0 4px 0 #8b7355; min-width: 120px;}
        #lottery-btn.show-result { background: #fff; color: #d00; font-weight: bold; cursor: default; }

        /* --- 核心修改2：神龙与枫树开场动画 --- */
        #intro-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999;
            background: var(--bg); display: flex; justify-content: center; align-items: center;
            transition: opacity 1s;
        }
        #intro-canvas.hidden { opacity: 0; pointer-events: none; }
        
        @media(max-width:600px){
            .scroll{padding:20px 10px;}
            h1{font-size:1.8em;}
            .paper{writing-mode:horizontal-tb;}
        }
    </style>
</head>
<body>

<!-- 历史纹路背景层 -->
<div id="history-bg"></div>

<!-- 开场动画层 -->
<div id="intro-canvas">
    <svg id="dragon-svg" width="200" height="200" viewBox="0 0 200 200" style="opacity:0;">
        <!-- 简化的龙形路径 -->
        <path d="M100,180 Q120,150 140,160 T180,120 Q160,100 140,110 T100,80 Q80,60 60,70 T20,40 Q40,20 60,30 T100,10" fill="none" stroke="#d4af37" stroke-width="4"/>
        <circle cx="100" cy="10" r="15" fill="#d4af37"/>
    </svg>
    <div id="maple-logo" style="position:absolute; font-size:80px; color:#d4af37; opacity:0; transform:scale(0);">🍁</div>
</div>

<div class="scroll">
    <div class="rod"></div>
    <div class="paper">
        <h1>枫树纸飞机</h1>
        
        <div class="stats">
            <p>当前里程：<span id="dist" class="highlight">0</span> m</p>
            <p>飞行时间：<span id="time" class="highlight">00:00</span></p>
            <p>精确计时：<span id="precise-time" class="highlight">00:00.00</span></p>
            <p>最高记录：<span id="best-dist" class="highlight">0</span> m</p>
        </div>

        <div class="controls">
            <button onclick="launch()">发射</button>
            <button onclick="reset()">重置</button>
            <button onclick="toggleTheme()">切换主题</button>
            <button id="lottery-btn" onclick="drawLottery()">求签</button>
        </div>

        <div style="margin-top:40px;opacity:0.6;font-size:0.9em;">
            <p>点击发射开始飞行</p>
            <p>里程增加将解锁历史纹路</p>
        </div>
    </div>
    <div class="rod"></div>
</div>

<!-- 成就弹窗 -->
<div id="achievement-modal">
    <h2>🏆 获得成就</h2>
    <p id="ach-text">初出茅庐</p>
    <button onclick="closeModal()" style="margin-top:15px;">收下</button>
</div>

<script>
    let distance = 0;
    let isFlying = false;
    let timerInterval;
    let preciseInterval;
    let startTime;
    let bestDistance = localStorage.getItem('bestDist') || 0;
    let achievementUnlocked = false;
    
    document.getElementById('best-dist').innerText = bestDistance;

    // --- 核心修改1：真正的 SVG 纹路定义 (博物馆级还原) ---
    const patterns = {
        // 商周：饕餮纹/回纹 (深沉、几何感强)
        shang: `url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h30v30H0V0zm30 30h30v30H30V30z' fill='%235d3a28' fill-opacity='0.4'/%3E%3Cpath d='M15 15h10v10H15V15zm30 30h10v10H45V45z' fill='%233d2b1f' fill-opacity='0.4'/%3E%3C/svg%3E")`,
        
        // 战国/汉：云气纹 (流动、曲线)
        han: `url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 40 Q 25 10 40 40 T 70 40' stroke='%235d3a28' stroke-width='2' fill='none' opacity='0.4'/%3E%3Cpath d='M10 60 Q 25 30 40 60 T 70 60' stroke='%235d3a28' stroke-width='2' fill='none' opacity='0.4'/%3E%3C/svg%3E")`,
        
        // 唐：宝相花 (繁复、对称)
        tang: `url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='50' cy='50' r='10' fill='%238b0000' opacity='0.3'/%3E%3Cpath d='M50 20 Q 70 40 50 60 Q 30 40 50 20 Z' fill='%238b0000' opacity='0.2'/%3E%3Cpath d='M20 50 Q 40 30 60 50 Q 40 70 20 50 Z' fill='%238b0000' opacity='0.2'/%3E%3C/svg%3E")`,
        
        // 明清：缠枝莲 (连绵、细腻)
        ming: `url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 90 C 30 70 50 90 70 70 S 90 30 90 10' stroke='%235d3a28' stroke-width='1.5' fill='none' opacity='0.4'/%3E%3Ccircle cx='30' cy='70' r='5' fill='%235d3a28' opacity='0.4'/%3E%3Ccircle cx='70' cy='30' r='5' fill='%235d3a28' opacity='0.4'/%3E%3C/svg%3E")`
    };

    function updateBackground() {
        const bgDiv = document.getElementById('history-bg');
        if (distance < 25) {
            bgDiv.style.backgroundImage = patterns.shang;
        } else if (distance < 50) {
            bgDiv.style.backgroundImage = patterns.han;
        } else if (distance < 75) {
            bgDiv.style.backgroundImage = patterns.tang;
        } else {
            bgDiv.style.backgroundImage = patterns.ming;
        }
    }

    function launch() {
        if(isFlying) return;
        isFlying = true;
        startTime = Date.now();
        
        timerInterval = setInterval(() => {
            distance += Math.random() * 0.5; 
            document.getElementById('dist').innerText = distance.toFixed(1);
            checkAchievements();
            updateBackground(); // 实时更新背景
        }, 100);

        preciseInterval = setInterval(() => {
            const now = Date.now();
            const diff = now - startTime;
            const mins = Math.floor(diff / 60000).toString().padStart(2, '0');
            const secs = ((diff % 60000) / 1000).toFixed(2).padStart(5, '0');
            document.getElementById('precise-time').innerText = `${mins}:${secs}`;
        }, 10);
    }

    function reset() {
        clearInterval(timerInterval);
        clearInterval(preciseInterval);
        isFlying = false;
        if(distance > bestDistance) {
            bestDistance = distance;
            localStorage.setItem('bestDist', bestDistance);
            document.getElementById('best-dist').innerText = bestDistance.toFixed(1);
        }
        distance = 0;
        document.getElementById('dist').innerText = "0";
        document.getElementById('precise-time').innerText = "00:00.00";
        updateBackground();
    }

    function checkAchievements() {
        if(!achievementUnlocked && distance >= 100) {
            achievementUnlocked = true;
            document.getElementById('achievement-modal').style.display = 'block';
            document.getElementById('ach-text').innerText = "百年好合 (里程破百)";
        }
    }

    function closeModal() {
        document.getElementById('achievement-modal').style.display = 'none';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark');
    }

    function drawLottery() {
        const btn = document.getElementById('lottery-btn');
        if(btn.classList.contains('show-result')) return;
        
        const results = ["上上签", "中吉", "末吉", "凶", "大吉"];
        const result = results[Math.floor(Math.random() * results.length)];
        
        btn.innerText = result;
        btn.classList.add('show-result');
        
        setTimeout(() => {
            btn.innerText = "求签";
            btn.classList.remove('show-result');
        }, 3000);
    }

    // --- 核心修改2：神龙化枫树开场动画逻辑 ---
    window.onload = function() {
        const introCanvas = document.getElementById('intro-canvas');
        const dragonSvg = document.getElementById('dragon-svg');
        const mapleLogo = document.getElementById('maple-logo');
        
        // 1. 纸飞机飞出 (这里用龙的初始位置代替，简化为龙出现)
        setTimeout(() => {
            dragonSvg.style.opacity = 1;
            dragonSvg.style.transition = "all 2s";
            dragonSvg.style.transform = "rotate(360deg) scale(1.5)";
        }, 500);

        // 2. 龙变成神龙 (旋转放大后消失)
        setTimeout(() => {
            dragonSvg.style.opacity = 0;
            dragonSvg.style.transform = "rotate(720deg) scale(0)";
        }, 2500);

        // 3. 枫树像烟花一样展开
        setTimeout(() => {
            mapleLogo.style.opacity = 1;
            mapleLogo.style.transition = "all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            mapleLogo.style.transform = "scale(1) rotate(0deg)";
        }, 3000);

        // 4. 动画结束，进入主界面
        setTimeout(() => {
            introCanvas.classList.add('hidden');
        }, 4500);
    };

    // 初始化背景
    updateBackground();
</script>
</body>
</html>
